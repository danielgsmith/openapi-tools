openapi: 3.0.3
info:
  title: Store API
  description: A sample store API for testing openapi-tools commands.
  version: 1.0.0
servers:
  - url: https://api.store.example.com/v1
paths:
  /products:
    get:
      summary: List all products
      description: Returns a list of all products in the store.
      operationId: listProducts
      tags:
        - products
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: Maximum number of results to return.
      responses:
        '200':
          description: A list of products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Products'
        '400':
          description: Bad request
    post:
      summary: Create a product
      description: Creates a new product.
      operationId: createProduct
      tags:
        - products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Bad request
  /products/{productId}:
    get:
      summary: Get a product by ID
      description: Retrieves a single product by its unique identifier.
      operationId: getProduct
      tags:
        - products
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the product to retrieve.
      responses:
        '200':
          description: A single product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Bad request
        '404':
          description: Not found
  /search:
    get:
      summary: Search products
      description: Search for products by keyword.
      operationId: searchProducts
      tags:
        - products
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query.
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Products'
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags:
        - system
      responses:
        '200':
          description: Service is healthy
components:
  schemas:
    Product:
      type: object
      description: A product in the store.
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: Unique product identifier.
        name:
          type: string
          description: Product name.
        price:
          type: string
          description: Product price as a string.
    Products:
      type: array
      items:
        $ref: '#/components/schemas/Product'
    Order:
      type: object
      required:
        - id
        - productId
      properties:
        id:
          type: string
        productId:
          type: string
  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key authentication.