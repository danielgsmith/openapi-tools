openapi: 3.0.3
info:
  title: Users API
  description: User management service.
  version: 1.0.0
servers:
  - url: https://users.example.com
paths:
  /users:
    get:
      summary: List users
      description: Returns all users.
      operationId: listUsers
      tags:
        - users
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad request
    post:
      summary: Create a user
      operationId: createUser
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /users/{userId}:
    get:
      summary: Get a user
      description: Retrieves a user by ID.
      operationId: getUser
      tags:
        - users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: The user ID.
      responses:
        '200':
          description: A single user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Not found
components:
  schemas:
    User:
      type: object
      description: A user in the system.
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: User ID.
        name:
          type: string
          description: User name.
        email:
          type: string
          format: email
          description: User email.
    Error:
      type: object
      description: Error response.
      properties:
        code:
          type: integer
        message:
          type: string
  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key auth.