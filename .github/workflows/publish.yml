name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/OpenApiTools/OpenApiTools.csproj --configuration Release --no-build --output artifacts

      - name: Create smoke-test NuGet config
        run: |
          cat > smoke-test.nuget.config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="local" value="./artifacts" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          EOF

      - name: Install tool from package
        run: dotnet tool install --tool-path ./.tools DanielGSmith.OpenApiTools --configfile ./smoke-test.nuget.config

      - name: Smoke test tool help
        run: ./.tools/openapi-tool --help

      - name: Smoke test merge help
        run: ./.tools/openapi-tool merge --help

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push "artifacts/*.nupkg" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --source "https://nuget.pkg.github.com/danielgsmith/index.json" \
            --skip-duplicate

      - name: NuGet.org login via trusted publishing
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "artifacts/*.nupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
