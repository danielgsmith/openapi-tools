name: ci

on:
  push:
    branches:
      - main
      - master
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"
  pull_request:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/OpenApiTools/OpenApiTools.csproj --configuration Release --no-build --output artifacts

      - name: Create smoke-test NuGet config
        run: |
          cat > smoke-test.nuget.config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="local" value="./artifacts" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          EOF

      - name: Install tool from package
        run: dotnet tool install --tool-path ./.tools DanielGSmith.OpenApiTools --configfile ./smoke-test.nuget.config

      - name: Smoke test tool help
        run: ./.tools/openapi-tool --help

      - name: Smoke test merge help
        run: ./.tools/openapi-tool merge --help
